name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Tidy modules
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test (memory)
        run: go test -v ./...

      - name: Test (with SQLite)
        run: go test -tags sqlite -v ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22']
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
        run: |
          OUTPUT="bin/ministore-${{ matrix.goos }}-${{ matrix.goarch }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -tags sqlite -o "$OUTPUT" ./cmd/ministore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ministore-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/ministore-${{ matrix.goos }}-${{ matrix.goarch }}
